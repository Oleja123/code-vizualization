services:

  # ── Infrastructure ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: codeviz-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: codeviz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: server_code_visualization
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go services ─────────────────────────────────────────────────
  semantic-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codeviz-semantic-analyzer
    restart: unless-stopped
    ports:
      - "8082:8082"

  interpreter:
    build:
      context: .
      dockerfile: interpreter-service/Dockerfile
    container_name: codeviz-interpreter
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8084:8084"

  cppcheck-analyzer:
    build:
      context: .
      dockerfile: cppcheck-analyzer-service/Dockerfile
    container_name: codeviz-cppcheck-analyzer
    restart: unless-stopped
    ports:
      - "8086:8086"

  # ── Java services ───────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: codeviz-auth
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/server_code_visualization
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  flowchart-visualizer:
    build:
      context: ./flowchart-visualizer
      dockerfile: Dockerfile
    container_name: codeviz-flowchart
    restart: unless-stopped
    environment:
      AST_SERVICE_URL: http://semantic-analyzer:8082
      AUTH_SERVICE_URL: http://auth-service:8083
    depends_on:
      - semantic-analyzer
      - auth-service

  metrics-service:
    build:
      context: ./metrics-service
      dockerfile: Dockerfile
    container_name: codeviz-metrics
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/server_code_visualization
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      AST_SERVICE_URL: http://semantic-analyzer:8082
      AUTH_SERVICE_URL: http://auth-service:8083
    depends_on:
      postgres:
        condition: service_healthy
      semantic-analyzer:
        condition: service_started
      auth-service:
        condition: service_started

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_ENABLED: "true"
        VITE_AUTH_SERVICE_URL: "http://localhost:3000"
        VITE_FLOWCHART_SERVICE_URL: "http://localhost:3000"
        VITE_METRICS_SERVICE_URL: "http://localhost:3000"
    container_name: codeviz-frontend
    restart: unless-stopped
    depends_on:
      - auth-service
      - flowchart-visualizer
      - metrics-service
      - interpreter
      - cppcheck-analyzer

  # ── Nginx reverse proxy ─────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: codeviz-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - flowchart-visualizer
      - metrics-service
      - frontend

volumes:
  pg_data: