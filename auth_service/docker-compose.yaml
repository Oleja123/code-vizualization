version: "3.8"
services:
  db:
    image: postgres:16
    container_name: postgres-code-visualization
    environment:
      POSTGRES_DB: server_code_visualization
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
volumes:
  pg_data: